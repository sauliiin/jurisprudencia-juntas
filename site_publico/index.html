<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Busca de Decisões</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <strong>Busca de Decisões</strong>
          <span id="stats">Carregando acervo</span>
        </div>
        <form id="search-form" class="searchbar">
          <input
            id="search-input"
            type="search"
            autocomplete="off"
            placeholder="Buscar por texto, auto, autuado, infração, local ou lei"
          />
          <select id="instance-filter" aria-label="Instância">
            <option value="todas">Todas</option>
            <option value="1a_instancia">1ª instância</option>
            <option value="2a_instancia">2ª instância</option>
          </select>
          <select id="search-mode" aria-label="Modo de busca">
            <option value="phrase">Expressão</option>
            <option value="any">Qualquer palavra</option>
          </select>
          <select id="month-filter" aria-label="Mês">
            <option value="">Mês</option>
            <option value="janeiro">Janeiro</option>
            <option value="fevereiro">Fevereiro</option>
            <option value="março">Março</option>
            <option value="abril">Abril</option>
            <option value="maio">Maio</option>
            <option value="junho">Junho</option>
            <option value="julho">Julho</option>
            <option value="agosto">Agosto</option>
            <option value="setembro">Setembro</option>
            <option value="outubro">Outubro</option>
            <option value="novembro">Novembro</option>
            <option value="dezembro">Dezembro</option>
          </select>
          <select id="year-filter" aria-label="Ano">
            <option value="">Ano</option>
          </select>
          <button type="submit">Buscar</button>
        </form>
      </header>

      <section class="workspace">
        <aside class="results-pane">
          <div class="results-meta">
            <span id="result-count">0 resultados</span>
            <button id="load-more" class="btn-neon" type="button" hidden>Mais</button>
          </div>
          <div id="results" class="results-list" aria-live="polite"></div>
          <div id="pagination-bar" class="pagination-bar" hidden>
            <button id="page-prev" class="btn-neon" type="button" disabled>Anterior</button>
            <span id="page-info">Página 1</span>
            <button id="page-next" class="btn-neon" type="button">Próxima</button>
          </div>
        </aside>

        <section class="detail-pane">
          <div id="empty-state" class="empty-state">
            <strong>Selecione uma decisão</strong>
            <span>A prévia aparecerá aqui.</span>
          </div>

          <article id="detail" class="detail" hidden>
            <div class="detail-head">
              <div>
                <span id="detail-instance" class="badge"></span>
                <h1 id="detail-title"></h1>
                <p id="detail-subtitle"></p>
              </div>
              <a id="open-file" class="open-button" target="_blank" rel="noreferrer">Abrir inteiro</a>
            </div>

            <div id="autos" class="autos"></div>

            <div class="preview-toolbar">
              <span id="preview-label"></span>
              <button id="show-text" class="subtle" type="button">Texto</button>
              <button id="show-file" class="subtle" type="button">Arquivo</button>
            </div>

            <div id="preview" class="preview"></div>
          </article>
        </section>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
